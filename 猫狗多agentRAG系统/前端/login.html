<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫狗知识百科 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="auth-container" class="auth-container">
        <!-- 登录框 -->
        <div id="login-box" class="auth-box">
            <div class="logo">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20cat%20and%20dog%20icon%20cartoon%20style%20friendly%20pet%20logo&image_size=square" alt="Logo">
                <h1>猫狗知识百科</h1>
            </div>
            
            <h2>欢迎回来</h2>
            
            <div id="login-error" class="error-message"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码">
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="remember-me">
                        记住我
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
            
            <div class="auth-link">
                <p>还没有账号？<a href="#" id="show-register">立即注册</a></p>
                <p><a href="#">忘记密码？</a></p>
            </div>
            
            <!-- 管理员账户提示 -->
            <div style="margin-top: 20px; padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; font-size: 12px; color: #ccc;">
                <strong>管理员测试账户：</strong><br>
                用户名: admin<br>
                密码: admin123<br>
                <br>
                <strong>普通用户测试账户：</strong><br>
                用户名: user<br>
                密码: user123
            </div>
        </div>
        
        <!-- 注册框 -->
        <div id="register-box" class="auth-box" style="display: none;">
            <div class="logo">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20cat%20and%20dog%20icon%20cartoon%20style%20friendly%20pet%20logo&image_size=square" alt="Logo">
                <h1>猫狗知识百科</h1>
            </div>
            
            <h2>创建账户</h2>
            
            <div id="register-error" class="error-message"></div>
            <div id="register-success" class="success-message"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="register-username">用户名</label>
                    <input type="text" id="register-username" placeholder="请输入用户名（3-20字符）">
                </div>
                
                <div class="form-group">
                    <label for="register-email">邮箱地址</label>
                    <input type="email" id="register-email" placeholder="请输入邮箱地址">
                </div>
                
                <div class="form-group">
                    <label for="register-password">密码</label>
                    <input type="password" id="register-password" placeholder="请输入密码（至少6位，包含字母和数字）">
                </div>
                
                <div class="form-group">
                    <label for="register-confirm-password">确认密码</label>
                    <input type="password" id="register-confirm-password" placeholder="请再次输入密码">
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="agree-terms">
                        我已阅读并同意<a href="#">用户协议</a>和<a href="#">隐私政策</a>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary">注册</button>
            </form>
            
            <div class="auth-link">
                <p>已有账号？<a href="#" id="show-login">立即登录</a></p>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
